<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Learn numbers in French and Italian with flashcards. Works offline.">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NumFlash">
    <title>Number Flash</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="hidden">
        <!-- Home View -->
        <section id="home-view" class="view">
            <h1>Number Flash</h1>
            <div class="setup-group">
                <label for="language-select">Target Language</label>
                <select id="language-select">
                    <option value="fr-FR">French</option>
                    <option value="it-IT">Italian</option>
                </select>
            </div>
            <div class="setup-group">
                <label>Number Range (0 - 100)</label>
                <div class="range-inputs">
                    <input type="number" id="range-min" min="0" max="100" value="0" placeholder="Min">
                    <span class="range-separator">to</span>
                    <input type="number" id="range-max" min="0" max="100" value="20" placeholder="Max">
                </div>
            </div>
            <div class="setup-group">
                <label for="reviews-count">Number of Reviews</label>
                <input type="number" id="reviews-count" min="1" max="100" value="20">
            </div>
            <div class="actions">
                <button id="start-btn" class="primary">Start Session</button>
                <button id="stats-btn" class="secondary">View Stats</button>
            </div>
        </section>

        <!-- Session View -->
        <section id="session-view" class="view hidden">
            <div class="session-header">
                <button id="exit-btn" class="exit-link">✕ Exit</button>
                <div id="session-progress" class="session-progress"></div>
            </div>
            <div id="countdown" class="overlay hidden">3</div>
            <div id="card-container">
                <div id="flashcard">
                    <div class="card-face front"></div>
                    <div class="card-face back"></div>
                </div>
            </div>
            <div id="session-controls" class="hidden">
                <button id="incorrect-btn" class="btn-x">✕</button>
                <button id="correct-btn" class="btn-check">✓</button>
            </div>
        </section>

        <!-- Summary View -->
        <section id="summary-view" class="view hidden">
            <h2>Session Complete</h2>
            <div id="summary-stats">
                <div class="summary-card">
                    <span class="summary-label">Time</span>
                    <span class="summary-value"><span id="summary-time">0</span>s</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">Accuracy</span>
                    <span class="summary-value"><span id="summary-accuracy">0</span>%</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">Avg Flip</span>
                    <span class="summary-value"><span id="summary-avg-time">0</span>s</span>
                </div>
            </div>

            <div id="summary-results" class="summary-results-container hidden">
                <h3>Session Review (by difficulty)</h3>
                <div id="summary-results-list" class="stats-list"></div>
            </div>

            <button id="finish-btn" class="primary">Back to Home</button>
        </section>

        <!-- Stats View -->
        <section id="stats-view" class="view hidden">
            <header>
                <button id="stats-back-btn" class="back-link">← Back</button>
                <h2>My Progress</h2>
            </header>
            <div id="stats-list" class="stats-list"></div>
        </section>
    </div>

    <script src="app.js" type="module"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
